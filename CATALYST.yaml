common:
  meta:
    min_ver: 1.1.0
  manifest:
    name: cob
    type: BINARY
    version: 0.6.0-dev
    description: The Catalyst Orchestrated Builder
    provides: cob
    toolchain: tc_cob_common.yaml
    dirs:
      include:
        - include
      source:
        - src
      build: build
  dependencies:
    - name: reproc
      source: vcpkg
      triplet: x64-linux
      version: latest
  features:
    - binary: true
    - profiling: false
    - logging: false
    - heterogeneous_core_affinity: false
    - json_impl:
        default: false
        files: [src/json.cpp, include/cob/json.hpp]
    - estimates:
        default: false
        files: [src/work_estimate.cpp, include/cob/work_estimate.hpp]
    - progress_queue_size:
        type: int
        default: 8192
    - buffer_initial_capacity:
        type: int
        default: 2097152
    - flush_threshold:
        type: int
        default: 1048576
    - rsp_input_threshold:
        type: int
        default: 50
    - rsp_path_estimate:
        type: int
        default: 100
    - heavy_task_threshold:
        type: int
        default: 100
    - map_initial_capacity:
        type: int
        default: 16
test:
  manifest:
    dirs:
      source:
        - tests
      build: build_tests
benchmark:
  manifest:
    name: cob_benchmark
    provides: cob_benchmark
    description: COB with Benchmarking Flags Enabled
    toolchain: ./tc_cob_benchmark.yaml
ccache:
  manifest:
    tooling:
      CC_LAUNCHER: ccache
      CXX_LAUNCHER: ccache
debug:
  manifest:
    toolchain: ./tc_cob_debug.yaml
release:
  manifest:
    toolchain: tc_cob_release.yaml
  hooks:
    post-build:
      - catalyst: pack -q -p common release -a
