common:
  meta:
    min_ver: 1.1.0
  manifest:
    name: cbe
    type: BINARY
    version: 0.2.0
    description: The Catalyst Build Executor
    provides: cbe
    tooling:
      CC: clang
      CXX: clang++
      CCFLAGS: ""
      CXXFLAGS: --std=c++23 -Wall -Wextra -O3
    dirs:
      include:
        - include
      source:
        - src
      build: build
  dependencies:
    - name: reproc
      source: vcpkg
      triplet: x64-linux
      version: latest
    - name: nlohmann-json
      source: vcpkg
      triplet: x64-linux
      version: latest
      linkage: interface
  features:
    - binary: true
    - profiling: false
    - logging: false
    - estimates:
        default: false
        files: [src/work_estimate.cpp, include/cbe/work_estimate.hpp]
test:
  manifest:
    dirs:
      source:
        - tests
      build: build_tests
benchmark:
  manifest:
    name: cbe_benchmark
    provides: cbe_benchmark
    description: CBE with Benchmarking Flags Enabled
    tooling:
      CXXFLAGS: --std=c++23 -Wall -Wextra -O0 -g -fno-omit-frame-pointer
ccache:
  manifest:
    tooling:
      CC_LAUNCHER: ccache
      CXX_LAUNCHER: ccache
release:
  manifest:
    tooling:
      CCFLAGS: -O3 -DNDEBUG --std=c++23 -Wall -Wextra -Wpedantic
      CXXFLAGS: -O3 -DNDEBUG --std=c++23 -Wall -Wextra -Wpedantic
      LDFLAGS: -static -fuse-ld=mold -flto=full -Wl,-O3 -Wl,--gc-sections -Wl,--icf=safe -Wl,--as-needed -Wl, --no-undefined -Wl,-z,relro,-z,now -Wl,--hash-style=gnu -Wl,--build-id=sha1 -Wl,--strip-all
  hooks:
    post-build:
      - catalyst: pack -p common release -a
